<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop AI Pet — Downloads</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        --bg: #12141a;
        --card: #1c1f28;
        --text: #f4f5f8;
        --muted: #a7adb9;
        --accent: #7ec8ff;
        --border: rgba(255, 255, 255, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1d2433, var(--bg) 55%);
        color: var(--text);
      }
      main {
        max-width: 800px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      .eyebrow {
        color: var(--accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.75rem;
        margin-bottom: 12px;
      }
      .lead { color: var(--muted); line-height: 1.5; margin: 0 0 28px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .version-row {
        display: flex;
        gap: 20px;
        align-items: stretch;
        justify-content: space-between;
      }
      .version-main {
        flex: 1 1 auto;
        min-width: 0;
      }
      .version-hero {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-width: 140px;
      }
      .version-hero img {
        width: 148px;
        height: 148px;
        object-fit: contain;
        border-radius: 16px;
        background: radial-gradient(circle at 50% 40%, #2a3140, #141820 70%);
        border: 1px solid var(--border);
        image-rendering: auto;
      }
      .version-hero .pet-name {
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.04em;
      }
      .version {
        font-size: 1.4rem;
        font-weight: 700;
        margin: 0 0 4px;
      }
      .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; }
      a.button {
        display: inline-block;
        margin: 0 10px 10px 0;
        padding: 10px 14px;
        border-radius: 10px;
        background: var(--accent);
        color: #0b1520;
        text-decoration: none;
        font-weight: 700;
      }
      a.button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .error { color: #ffb4a8; }
      footer { margin-top: 28px; color: var(--muted); font-size: 0.85rem; }
      footer a { color: var(--accent); }
      @media (max-width: 560px) {
        .version-row { flex-direction: column-reverse; align-items: center; text-align: center; }
        .version-main { width: 100%; }
        a.button { margin: 0 6px 10px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Desktop AI Pet</div>
      <h1>다운로드 / Downloads</h1>
      <p class="lead">
        Desktop AI Pet 실행 파일을 받을 수 있는 페이지입니다.
        Windows와 macOS용 빌드를 아래에서 선택해 다운로드하세요.
      </p>

      <section class="card" id="latest-card">
        <p class="meta">최신 버전 정보를 불러오는 중…</p>
      </section>

      <footer>
        <a href="https://github.com/bluecafe/pet-releases/releases">모든 버전 (GitHub Releases)</a>
      </footer>
    </main>
    <script>
      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      async function loadLatest() {
        const card = document.getElementById("latest-card");
        try {
          const res = await fetch("./latest.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const downloads = data.downloads || {};
          const links = Object.entries(downloads)
            .map(([key, item]) => {
              const href = item.url || item.path || "#";
              const label = item.label || key;
              return `<a class="button" href="${escapeHtml(href)}">${escapeHtml(label)}</a>`;
            })
            .join("");
          const notesUrl = data.githubReleaseUrl || data.releaseNotesUrl || "";
          const heroSrc = data.heroImage || "";
          const heroName =
            data.heroNameKo && data.heroName
              ? `${data.heroNameKo} / ${data.heroName}`
              : data.heroNameKo || data.heroName || "";
          const published = data.publishedAt
            ? `게시: ${escapeHtml(String(data.publishedAt).replace("T", " ").replace(/\.\d+Z$/, " UTC"))}`
            : "";

          const heroHtml = heroSrc
            ? `<div class="version-hero">
                 <img src="${escapeHtml(heroSrc)}" alt="${escapeHtml(heroName || "대표 캐릭터")}" width="148" height="148" />
                 ${heroName ? `<span class="pet-name">${escapeHtml(heroName)}</span>` : ""}
               </div>`
            : "";

          card.innerHTML = `
            <div class="version-row">
              <div class="version-main">
                <p class="version" id="v${escapeHtml(data.latest)}">v${escapeHtml(data.latest)}</p>
                <p class="meta">${published}</p>
                <div>${links || "<span class='error'>다운로드 항목이 없습니다.</span>"}</div>
                ${
                  notesUrl
                    ? `<p class="meta" style="margin-top:12px;margin-bottom:0">
                        <a class="button secondary" href="${escapeHtml(notesUrl)}">릴리즈 노트</a>
                      </p>`
                    : ""
                }
              </div>
              ${heroHtml}
            </div>
          `;
        } catch (error) {
          card.innerHTML = `<p class="error">버전 정보를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</p>`;
        }
      }
      loadLatest();
    </script>
  </body>
</html>
